<!DOCTYPE html>
<html lang="en">
<head>
     <meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mainContainer">
        <div class="container">
            <div class="win"> YOU WIN🎉🏆</div>
            <div class="first">Number Guessing game</div>
            <div class="second">I'm thinking of a number between 1 and 100! Can you guess it?</div>
            
            
             <div class="con_second">             
             <h2>Your Guess:</h2>
            <div class="third"> 
                <input type="number" name="" id="input">
                <button class="btn" type="submit">Guess✅</button>
            </div>
 
 
            <div class="last">
                <div class="range">Best Of Luck🤞</div>
                <div class="count">Guesses:00</div>
             </div>
             
             <div class="reset">
                 <button class="resetbtn" type="submit"> Reset Game</button>
             </div>
          
          
             </div>
         </div>
         
     </div>
 </body>
 <script src="script.js" defer></script>
 </html>
